<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 620px;
        background: transparent;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        color: #f8fafc;
      }
      .player-shell {
        background: linear-gradient(180deg, #102218 0%, #0c1b14 100%);
        border: 1px solid rgba(74, 222, 128, 0.18);
        border-radius: 20px;
        padding: 14px;
        box-sizing: border-box;
        min-height: 620px;
      }
      .player-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .player-title h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 800;
        color: #f8fafc;
      }
      .player-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 6px 10px;
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.24);
        color: #86efac;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      video {
        width: 100%;
        max-height: 300px;
        border-radius: 16px;
        background: #000;
        display: block;
      }
      .telemetry-panel {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 8px;
      }
      .metric {
        background: rgba(14, 31, 22, 0.92);
        border: 1px solid rgba(74, 222, 128, 0.16);
        border-radius: 14px;
        padding: 9px;
        min-height: 66px;
        box-sizing: border-box;
      }
      .metric-label {
        font-size: 10px;
        color: #a7f3d0;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .metric-value {
        font-size: 13px;
        font-weight: 700;
        color: #f8fafc;
        word-break: break-word;
        line-height: 1.25;
      }
      .player-note {
        margin-top: 10px;
        font-size: 11px;
        color: #a7f3d0;
        line-height: 1.45;
        padding: 9px 11px;
        border-radius: 14px;
        background: rgba(34, 197, 94, 0.08);
        border: 1px solid rgba(74, 222, 128, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="player-shell">
      <div class="player-title">
        <h3>Embedded HLS Player</h3>
        <span class="player-badge">Live browser telemetry</span>
      </div>
      <video id="video" controls playsinline muted></video>
      <div class="telemetry-panel">
        <div class="metric"><div class="metric-label">Player state</div><div class="metric-value" id="playerState">idle</div></div>
        <div class="metric"><div class="metric-label">Playback time</div><div class="metric-value" id="currentTime">0.0 s</div></div>
        <div class="metric"><div class="metric-label">Buffered ahead</div><div class="metric-value" id="bufferedAhead">0.0 s</div></div>
        <div class="metric"><div class="metric-label">Resolution</div><div class="metric-value" id="resolution">-</div></div>
        <div class="metric"><div class="metric-label">Dropped frames</div><div class="metric-value" id="droppedFrames">0</div></div>
        <div class="metric"><div class="metric-label">Total frames</div><div class="metric-value" id="totalFrames">0</div></div>
        <div class="metric"><div class="metric-label">Ready state</div><div class="metric-value" id="readyState">0</div></div>
        <div class="metric"><div class="metric-label">Network state</div><div class="metric-value" id="networkState">0</div></div>
      </div>
      <div class="player-note" id="playerNote">
        Press play to start sending live HLS player telemetry to FlowWatch.
      </div>
    </div>
    <script>
      function sendMessageToStreamlitClient(type, data) {
        const outData = Object.assign(
          {
            isStreamlitMessage: true,
            type: type,
          },
          data || {}
        );
        window.parent.postMessage(outData, "*");
      }

      const Streamlit = {
        setComponentReady: function() {
          sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });
        },
        setFrameHeight: function(height) {
          sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: height });
        },
        setComponentValue: function(value) {
          sendMessageToStreamlitClient("streamlit:setComponentValue", { value: value });
        },
        events: {
          addEventListener: function(_eventName, callback) {
            window.addEventListener("message", function(event) {
              if (
                event &&
                event.data &&
                event.data.type === "streamlit:render"
              ) {
                callback({ detail: event.data });
              }
            });
          },
        },
        RENDER_EVENT: "streamlit:render",
      };

      const video = document.getElementById("video");
      const noteEl = document.getElementById("playerNote");
      let hls = null;
      let playerState = "idle";
      let stallCount = 0;
      let previousCurrentTime = 0;
      let latestArgs = { stream_url: "", refresh_interval_ms: 2000 };
      let lastSentHash = "";
      let sendHandle = null;

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      }

      function setNote(message) {
        if (noteEl) noteEl.textContent = message;
      }

      function setState(nextState) {
        playerState = nextState;
        setText("playerState", nextState);
      }

      function bufferedAheadSeconds() {
        try {
          if (!video.buffered || video.buffered.length === 0) return 0;
          const end = video.buffered.end(video.buffered.length - 1);
          return Math.max(0, end - video.currentTime);
        } catch (error) {
          return 0;
        }
      }

      function getResolution() {
        return video.videoWidth && video.videoHeight
          ? `${video.videoWidth}x${video.videoHeight}`
          : "unknown";
      }

      function getFrameStats() {
        if (typeof video.getVideoPlaybackQuality === "function") {
          const quality = video.getVideoPlaybackQuality();
          return {
            dropped_frames: Number(quality.droppedVideoFrames || 0),
            total_frames: Number(quality.totalVideoFrames || 0),
          };
        }
        return { dropped_frames: 0, total_frames: 0 };
      }

      function buildMetrics() {
        const playbackTime = Number(video.currentTime || 0);
        const moving = playbackTime > previousCurrentTime + 0.05;
        const frameStats = getFrameStats();
        const metrics = {
          player_state: playerState,
          playback_time_seconds: Number(playbackTime.toFixed(2)),
          buffered_ahead_seconds: Number(bufferedAheadSeconds().toFixed(2)),
          resolution: getResolution(),
          dropped_frames: frameStats.dropped_frames,
          total_frames: frameStats.total_frames,
          ready_state: Number(video.readyState || 0),
          network_state: Number(video.networkState || 0),
          stall_count: stallCount,
          playback_time_moving: moving,
          last_update_epoch_ms: Date.now(),
        };
        previousCurrentTime = playbackTime;
        return metrics;
      }

      function updatePreview(metrics) {
        setText("playerState", metrics.player_state);
        setText("currentTime", `${metrics.playback_time_seconds.toFixed(1)} s`);
        setText("bufferedAhead", `${metrics.buffered_ahead_seconds.toFixed(1)} s`);
        setText("resolution", metrics.resolution);
        setText("droppedFrames", String(metrics.dropped_frames));
        setText("totalFrames", String(metrics.total_frames));
        setText("readyState", String(metrics.ready_state));
        setText("networkState", String(metrics.network_state));
      }

      function pushMetrics(force = false) {
        const metrics = buildMetrics();
        updatePreview(metrics);
        const comparable = {
          player_state: metrics.player_state,
          playback_time_seconds: Number(metrics.playback_time_seconds.toFixed(1)),
          buffered_ahead_seconds: Number(metrics.buffered_ahead_seconds.toFixed(1)),
          resolution: metrics.resolution,
          dropped_frames: metrics.dropped_frames,
          total_frames: metrics.total_frames,
          ready_state: metrics.ready_state,
          network_state: metrics.network_state,
          stall_count: metrics.stall_count,
          playback_time_moving: metrics.playback_time_moving,
        };
        const hash = JSON.stringify(comparable);
        if (force || hash !== lastSentHash) {
          lastSentHash = hash;
          Streamlit.setComponentValue(metrics);
        }
      }

      function clearPlayer() {
        if (sendHandle) {
          clearInterval(sendHandle);
          sendHandle = null;
        }
        if (hls) {
          hls.destroy();
          hls = null;
        }
        video.removeAttribute("src");
        video.load();
        playerState = "idle";
        stallCount = 0;
        previousCurrentTime = 0;
        lastSentHash = "";
      }

      function mountStream(streamUrl) {
        clearPlayer();
        if (!streamUrl) {
          setState("error");
          setNote("No HLS stream URL provided.");
          pushMetrics(true);
          return;
        }

        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = streamUrl;
          setState("ready");
          setNote("Native HLS playback detected.");
        } else if (window.Hls && window.Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(streamUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            setState("ready");
            setNote("Live HLS telemetry is ready. Press play on the video.");
            pushMetrics(true);
          });
          hls.on(Hls.Events.ERROR, (_event, data) => {
            if (data && data.fatal) {
              setState("error");
              setNote("The live HLS player encountered a fatal playback error.");
              pushMetrics(true);
            }
          });
        } else {
          setState("error");
          setNote("This browser cannot load HLS playback in the live telemetry component.");
          pushMetrics(true);
          return;
        }

        sendHandle = window.setInterval(() => pushMetrics(false), latestArgs.refresh_interval_ms || 2000);
        pushMetrics(true);
      }

      ["play", "playing"].forEach((eventName) =>
        video.addEventListener(eventName, () => {
          setState("playing");
          setNote("Live player metrics are being sent to FlowWatch.");
          pushMetrics(true);
        })
      );
      video.addEventListener("pause", () => {
        setState("paused");
        pushMetrics(true);
      });
      ["waiting", "stalled"].forEach((eventName) =>
        video.addEventListener(eventName, () => {
          stallCount += 1;
          setState("buffering");
          setNote("Playback is waiting for more data.");
          pushMetrics(true);
        })
      );
      video.addEventListener("loadedmetadata", () => {
        setState("ready");
        pushMetrics(true);
      });
      video.addEventListener("ended", () => {
        setState("ended");
        pushMetrics(true);
      });
      video.addEventListener("error", () => {
        setState("error");
        setNote("The browser video element reported a playback error.");
        pushMetrics(true);
      });

      function onRender(event) {
        const args = (event && event.detail && event.detail.args) || {};
        latestArgs = {
          stream_url: args.stream_url || "",
          refresh_interval_ms: Number(args.refresh_interval_ms || 2000),
        };
        mountStream(latestArgs.stream_url);
        Streamlit.setFrameHeight(document.documentElement.scrollHeight);
      }

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(620);
      window.setInterval(() => {
        Streamlit.setFrameHeight(document.documentElement.scrollHeight || 620);
      }, 1500);
    </script>
  </body>
</html>
